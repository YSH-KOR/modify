<title>Fuel Sheets</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;}

/* ── 상단 헤더 ── */
.top-header{
  position:sticky;top:0;z-index:1000;
  background:#ffffff;
  display:flex;align-items:center;
  padding:0 28px;
  height:58px;
  border-bottom:1px solid #dde3ea;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.top-header .logo{
  color:#e8000a;
  font-size:20px;font-weight:800;
  letter-spacing:5px;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.top-header .logo::before{
  content:'✈';font-size:20px;color:#e8000a;
}
.top-header .back-btn{
  display:none;
  margin-right:14px;
  background:transparent;
  border:1.5px solid #dde3ea;
  color:#333;
  padding:6px 16px;
  border-radius:8px;
  font-size:30px;font-weight:600;
  cursor:pointer;
  transition:background .15s;
  letter-spacing:1px;
}
.top-header .back-btn:hover{background:#f0f4f8;}

/* ── 홈 화면 ── */
#home{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:calc(100vh - 58px);
  gap:40px;
  background:linear-gradient(145deg,#f0f4f8 0%,#e8eef6 100%);
}
#home h1{
  color:#1e2d40;
  font-size:50px;
  font-weight:600;
  letter-spacing:8px;
  text-transform:uppercase;
  opacity:0.55;
}
.airline-grid{
  display:flex;gap:28px;flex-wrap:wrap;justify-content:center;
}
.airline-card{
  width:190px;height:190px;
  background:#ffffff;
  border:1.5px solid #dde3ea;
  border-radius:20px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;
  font-size:46px;font-weight:900;color:#1a56db;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.07);
  transition:transform .18s,box-shadow .18s,border-color .18s,color .18s;
  user-select:none;
}
.airline-card .card-label{
  font-size:12px;font-weight:600;
  letter-spacing:3px;color:#7a8fa6;
  text-transform:uppercase;
}
.airline-card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 16px 40px rgba(26,86,219,0.15);
  border-color:#1a56db;
  color:#1648c0;
}
.airline-card:active{
  transform:translateY(-2px) scale(1.01);
}

/* ── 항공사 페이지 ── */
.page{display:none;width:100%;height:calc(100vh - 58px);}
.page.active{display:block;}
iframe{width:100%;height:100%;border:none;background:white;touch-action:pan-x pan-y;}
</style>
</head>

<!-- 상단 헤더 -->
<div class="top-header">
  <button class="back-btn" id="backBtn" onclick="goHome()">← 뒤로가기</button>
  <span class="logo">STX</span>
</div>

<!-- 홈: 카테고리 선택 -->
<div id="home">

  <div class="airline-grid">
    <div class="airline-card" onclick="showPage('p9g')">9G</div>
    <div class="airline-card" onclick="showPage('pkc')">KC</div>
    <div class="airline-card" onclick="showPage('pak')">AK</div>
    <div class="airline-card" onclick="showPage('pd7')">D7</div>
  </div>
</div>

 type=&quot;text&quot; id=&quot;fuel_bill_no&quot; style=&quot;width:100%;font-size:20px;border:1px solid #d6d6d6;border-radius:6px;background:#fffdf2;text-align:center;padding:3px 1px;&quot;&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;table class=&quot;sub-table&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th colspan=&quot;2&quot;&gt;BOWSER UPLIFT CALCULATION&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td class=&quot;summary-label&quot;&gt;GALLONS&lt;/td&gt;&lt;td&gt;&lt;input type=&quot;number&quot; id=&quot;gallon&quot; step=&quot;0.1&quot; oninput=&quot;calc()&quot;&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td class=&quot;summary-label&quot;&gt;DENSITY&lt;/td&gt;&lt;td&gt;&lt;input type=&quot;number&quot; id=&quot;density&quot; step=&quot;0.001&quot; oninput=&quot;calc()&quot;&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;&lt;script&gt;function calc(){const tanks=[&apos;l&apos;,&apos;c&apos;,&apos;r&apos;,&apos;t&apos;];let totals={rem:0,bf:0,up:0,sum:0,adj:0,dep:0};tanks.forEach(tank=&gt;{const rem=parseFloat(document.getElementById(tank+&apos;_rem&apos;).value)||0;const bf=parseFloat(document.getElementById(tank+&apos;_bf&apos;).value)||0;const sumVal=parseFloat(document.getElementById(tank+&apos;_sum&apos;).value)||0;const adj=parseFloat(document.getElementById(tank+&apos;_adj&apos;).value)||0;const upVal=sumVal-bf;document.getElementById(tank+&apos;_up&apos;).value=upVal;let depVal=sumVal+adj;const manualDep=document.getElementById(tank+&apos;_dep&apos;).value;if(manualDep!==&quot;&quot;)depVal=parseFloat(manualDep);totals.rem+=rem;totals.bf+=bf;totals.up+=upVal;totals.sum+=sumVal;totals.adj+=adj;totals.dep+=depVal;});document.getElementById(&apos;tot_rem&apos;).innerText=totals.rem.toLocaleString();document.getElementById(&apos;tot_bf&apos;).innerText=totals.bf.toLocaleString();document.getElementById(&apos;tot_up&apos;).innerText=totals.up.toLocaleString();document.getElementById(&apos;tot_sum&apos;).innerText=totals.s const p2 =

const p3 =

totalDep.toLocaleString();
